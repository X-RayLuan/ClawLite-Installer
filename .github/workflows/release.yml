name: Build & Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to upload assets to (for example v1.3.88)'
        required: true
        default: 'v1.3.88'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build macOS (universal)
        env:
          # Build an unsigned DMG deterministically in CI.
          # Passing empty/invalid signing secrets makes electron-builder try to load
          # a certificate path and fail with "not a file" during mac packaging.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:mac-local
      - name: Verify macOS app version matches release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: node scripts/verify-mac-artifact.mjs "${RELEASE_TAG#v}" dist/clawlite.dmg
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawlite-dmg
          path: dist/clawlite.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Windows (x64)
        run: npm run build:win-local
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawlite-setup-exe
          path: dist/clawlite-setup.exe
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: clawlite-dmg
          path: dist
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: clawlite-setup-exe
          path: dist
      - name: Verify release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: gh release view "$RELEASE_TAG" --json tagName >/dev/null
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag || github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" dist/clawlite.dmg --clobber
          gh release upload "$RELEASE_TAG" dist/clawlite-setup.exe --clobber
